name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Go test
        run: go test ./...

      - name: Go build
        run: go build -o cyberbasic .

      - name: Lint examples (compile-only)
        run: |
          set -e
          for f in examples/*.bas; do
            echo "==> $f"
            ./cyberbasic --lint "$f"
          done

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.5
